<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>接案紀事</title>
<link rel="icon" type="image/png" href="./logo.png">
<link rel="apple-touch-icon" href="./logo.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:          #FFFFFF;
  --surface:     #FFFFFF;
  --surface-alt: #F7F7F5;
  --border:      #E9E9E7;
  --border-dark: #D3D3CF;
  --ink:         #1A1A1A;
  --ink-mid:     #787774;
  --ink-faint:   #AEADA9;
  --accent:      #1A1A1A;
  --tag-bg:      #F1F1EF;
  --tag-text:    #787774;
  --dot-a:       #E07B39;
  --dot-b:       #5A9E6F;
  --dot-c:       #9E5A9E;
  --dot-d:       #4A7FBF;
  --dot-e:       #4E9A97;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Plus Jakarta Sans', sans-serif;
  background: var(--bg);
  min-height: 100vh;
  color: var(--ink);
  font-size: 14px;
  line-height: 1.5;
}

.container {
  max-width: 1280px;
  margin: 0 auto;
  padding: 48px 40px;
}

/* ── Header ── */
header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  flex-wrap: wrap;
  gap: 20px;
  padding-bottom: 28px;
  margin-bottom: 28px;
  border-bottom: 1px solid var(--border);
}

.header-brand {
  display: flex;
  align-items: center;
  gap: 14px;
}

.logo-img {
  width: 48px;
  height: 48px;
  object-fit: contain;
}

.header-title h1 {
  font-size: 20px;
  font-weight: 700;
  color: var(--ink);
  letter-spacing: -0.3px;
}

.header-title .subtitle {
  font-size: 12px;
  color: var(--ink-faint);
  margin-top: 2px;
  font-weight: 400;
}

.stats {
  display: flex;
  gap: 0;
  border: 1px solid var(--border);
  border-radius: 8px;
  overflow: hidden;
}

.stat-box {
  padding: 10px 24px;
  text-align: center;
  border-right: 1px solid var(--border);
}

.stat-box:last-child { border-right: none; }

.stat-value {
  font-size: 20px;
  font-weight: 700;
  color: var(--ink);
  letter-spacing: -0.5px;
  line-height: 1;
}

.stat-label {
  font-size: 11px;
  color: var(--ink-faint);
  margin-top: 3px;
  font-weight: 400;
}

/* ── Tabs ── */
.tabs {
  display: flex;
  border-bottom: 1px solid var(--border);
  margin-bottom: 24px;
}

.tab-btn {
  padding: 0 4px 12px;
  margin-right: 28px;
  border: none;
  background: none;
  cursor: pointer;
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-size: 14px;
  font-weight: 600;
  color: var(--ink-faint);
  border-bottom: 2px solid transparent;
  transition: color 0.15s, border-color 0.15s;
}

.tab-btn:hover { color: var(--ink-mid); }
.tab-btn.active { color: var(--ink); border-bottom-color: var(--ink); }

.view { display: none; }
.view.active { display: block; }

/* ── Controls ── */
.controls {
  display: flex;
  gap: 8px;
  margin-bottom: 24px;
  align-items: center;
  flex-wrap: wrap;
}

.btn {
  padding: 7px 14px;
  border-radius: 6px;
  border: 1px solid var(--border);
  cursor: pointer;
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-size: 13px;
  font-weight: 500;
  transition: all 0.15s;
  white-space: nowrap;
}

.btn-primary {
  background: var(--ink);
  color: #fff;
  border-color: var(--ink);
}

.btn-primary:hover { background: #333; border-color: #333; }

.btn-secondary {
  background: var(--bg);
  color: var(--ink-mid);
}

.btn-secondary:hover { background: var(--surface-alt); color: var(--ink); }
.btn:disabled { opacity: 0.4; cursor: not-allowed; }

.filter-group {
  display: flex;
  margin-left: auto;
  border: 1px solid var(--border);
  border-radius: 6px;
  overflow: hidden;
}

.filter-btn {
  padding: 7px 14px;
  border: none;
  border-right: 1px solid var(--border);
  background: var(--bg);
  cursor: pointer;
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-size: 12px;
  font-weight: 500;
  color: var(--ink-mid);
  transition: all 0.15s;
}

.filter-btn:last-child { border-right: none; }
.filter-btn.active { background: var(--ink); color: #fff; }
.filter-btn:hover:not(.active) { background: var(--surface-alt); color: var(--ink); }

/* ── Grid ── */
.projects-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
  gap: 12px;
}

.loading-state {
  grid-column: 1 / -1;
  text-align: center;
  padding: 80px;
  color: var(--ink-faint);
  font-size: 14px;
}

/* ── Card ── */
.project-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 20px 22px;
  transition: box-shadow 0.2s, border-color 0.2s;
}

.project-card:hover {
  border-color: var(--border-dark);
  box-shadow: 0 4px 20px rgba(0,0,0,0.06);
}

.card-header {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  gap: 12px;
  margin-bottom: 14px;
}

.project-title {
  font-size: 15px;
  font-weight: 600;
  color: var(--ink);
  line-height: 1.3;
}

.project-client {
  font-size: 12px;
  color: var(--ink-faint);
  margin-top: 3px;
  font-weight: 400;
}

.status-tag {
  display: flex;
  align-items: center;
  gap: 5px;
  background: var(--tag-bg);
  border-radius: 4px;
  padding: 3px 8px;
  flex-shrink: 0;
  white-space: nowrap;
}

.status-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  flex-shrink: 0;
}

.status-dot.amber  { background: var(--dot-a); }
.status-dot.green  { background: var(--dot-b); }
.status-dot.purple { background: var(--dot-c); }
.status-dot.blue   { background: var(--dot-d); }
.status-dot.teal   { background: var(--dot-e); }

.status-label {
  font-size: 11px;
  font-weight: 500;
  color: var(--tag-text);
}

/* Dates */
.dates {
  display: flex;
  gap: 20px;
  padding: 10px 0;
  border-top: 1px solid var(--border);
  border-bottom: 1px solid var(--border);
  margin-bottom: 14px;
}

.date-label {
  font-size: 10px;
  font-weight: 500;
  text-transform: uppercase;
  letter-spacing: 0.6px;
  color: var(--ink-faint);
}

.date-value {
  font-size: 12px;
  color: var(--ink-mid);
  margin-top: 2px;
  font-weight: 500;
}

/* Progress */
.progress-section { margin-bottom: 2px; }

.progress-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 8px;
}

.progress-label {
  font-size: 11px;
  font-weight: 500;
  color: var(--ink-faint);
  text-transform: uppercase;
  letter-spacing: 0.6px;
}

.progress-value {
  font-size: 13px;
  font-weight: 700;
  color: var(--ink);
}

.progress-bar {
  width: 100%;
  height: 3px;
  background: var(--border);
  border-radius: 2px;
}

.progress-fill {
  height: 100%;
  background: var(--ink);
  border-radius: 2px;
  transition: width 0.4s ease;
}

/* Sections */
.section {
  margin-top: 14px;
  padding-top: 14px;
  border-top: 1px solid var(--border);
}

.section-title {
  font-size: 10px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.7px;
  color: var(--ink-faint);
  margin-bottom: 6px;
}

.section-content {
  font-size: 13px;
  color: var(--ink-mid);
  line-height: 1.65;
  font-weight: 400;
  white-space: pre-wrap;
}

/* Todo */
.todo-list { list-style: none; }

.todo-item {
  display: flex;
  align-items: flex-start;
  gap: 8px;
  padding: 4px 0;
  font-size: 13px;
  font-weight: 400;
  color: var(--ink-mid);
  line-height: 1.55;
}

.todo-item input[type="checkbox"] {
  margin-top: 2px;
  cursor: pointer;
  accent-color: var(--ink);
  flex-shrink: 0;
}

.todo-item.done span {
  text-decoration: line-through;
  color: var(--ink-faint);
}

.todo-delete {
  margin-left: auto;
  flex-shrink: 0;
  background: none;
  border: none;
  cursor: pointer;
  color: var(--ink-faint);
  font-size: 14px;
  line-height: 1;
  padding: 0 2px;
  opacity: 0;
  transition: opacity 0.15s, color 0.15s;
}
.todo-item:hover .todo-delete { opacity: 1; }
.todo-delete:hover { color: #d04040; }

/* Card Actions */
.card-actions {
  display: flex;
  gap: 0;
  margin-top: 14px;
  padding-top: 14px;
  border-top: 1px solid var(--border);
}

.action-btn {
  flex: 1;
  padding: 6px 4px;
  border: none;
  border-right: 1px solid var(--border);
  background: transparent;
  cursor: pointer;
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-size: 11px;
  font-weight: 500;
  color: var(--ink-faint);
  transition: all 0.15s;
  border-radius: 0;
}

.action-btn:last-child { border-right: none; }
.action-btn:hover { color: var(--ink); background: var(--surface-alt); }
.action-btn.danger:hover { color: #d04040; background: #fef5f5; }

/* ── Calendar ── */
.cal-layout {
  display: grid;
  grid-template-columns: 1fr 280px;
  gap: 24px;
  align-items: start;
}

.cal-toolbar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  flex-wrap: wrap;
  gap: 12px;
  margin-bottom: 16px;
}

.cal-nav {
  display: flex;
  align-items: center;
  gap: 10px;
}

.cal-nav .btn { padding: 6px 12px; }

.cal-month-label {
  font-size: 15px;
  font-weight: 700;
  color: var(--ink);
  min-width: 92px;
  text-align: center;
}

.cal-toolbar-actions {
  display: flex;
  align-items: center;
  gap: 8px;
  flex-wrap: wrap;
}

.cal-weekdays {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  margin-bottom: 4px;
}

.cal-weekdays div {
  text-align: center;
  font-size: 11px;
  font-weight: 600;
  color: var(--ink-faint);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  padding-bottom: 6px;
}

.cal-grid {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  grid-auto-rows: 118px;
  gap: 1px;
  background: var(--border);
  border: 1px solid var(--border);
  border-radius: 10px;
  overflow: hidden;
}

.cal-cell {
  background: var(--surface);
  padding: 6px 6px 8px;
  cursor: pointer;
  transition: background 0.15s;
  display: flex;
  flex-direction: column;
  gap: 4px;
  overflow: hidden;
}

.cal-cell:hover { background: var(--surface-alt); }
.cal-cell.muted { background: #FCFCFB; }
.cal-cell.muted .cal-day-num { color: var(--ink-faint); }

.cal-cell.today .cal-day-num {
  background: var(--ink);
  color: #fff;
  border-radius: 50%;
}

.cal-day-num {
  font-size: 12px;
  font-weight: 600;
  color: var(--ink-mid);
  width: 20px;
  height: 20px;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}

.cal-pills {
  display: flex;
  flex-direction: column;
  gap: 2px;
  overflow: hidden;
}

.cal-pill {
  display: flex;
  align-items: center;
  gap: 4px;
  font-size: 11px;
  font-weight: 500;
  color: var(--ink-mid);
  background: var(--tag-bg);
  border-radius: 4px;
  padding: 2px 6px;
  overflow: hidden;
  white-space: nowrap;
  text-overflow: ellipsis;
  transition: background 0.15s, color 0.15s;
}

.cal-pill:hover { background: var(--border); color: var(--ink); }

.cal-more {
  font-size: 10px;
  font-weight: 500;
  color: var(--ink-faint);
  padding: 0 6px;
}

.cal-sidebar-title {
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.7px;
  color: var(--ink-faint);
  margin-bottom: 12px;
}

.cal-agenda {
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.cal-agenda-item {
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 10px 12px;
  cursor: pointer;
  transition: border-color 0.15s, box-shadow 0.15s;
}

.cal-agenda-item:hover { border-color: var(--border-dark); box-shadow: 0 4px 16px rgba(0,0,0,0.06); }

.cal-agenda-date {
  font-size: 10px;
  font-weight: 600;
  color: var(--ink-faint);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-bottom: 6px;
}

.cal-agenda-main {
  display: flex;
  align-items: center;
  gap: 6px;
}

.cal-agenda-title {
  font-size: 13px;
  font-weight: 500;
  color: var(--ink);
}

.cal-agenda-project {
  font-size: 11px;
  color: var(--ink-faint);
  margin-top: 4px;
  margin-left: 14px;
}

.cal-agenda-empty {
  font-size: 12px;
  color: var(--ink-faint);
  padding: 4px 0;
}

@media (max-width: 900px) {
  .cal-layout { grid-template-columns: 1fr; }
}

@media (max-width: 640px) {
  .cal-toolbar-actions { width: 100%; }
  #calTypeFilter {
    width: 100%;
    overflow-x: auto;
    flex-wrap: nowrap;
    -webkit-overflow-scrolling: touch;
  }
  .cal-weekdays div { font-size: 10px; padding-bottom: 4px; }
  .cal-grid { grid-auto-rows: 58px; }
  .cal-cell { padding: 3px 3px 4px; gap: 2px; overflow: hidden; }
  .cal-day-num { font-size: 11px; width: 16px; height: 16px; }
  .cal-pill { font-size: 9px; padding: 1px 4px; gap: 3px; }
  .cal-more { font-size: 9px; padding: 0 4px; }
}

@media (max-width: 400px) {
  .cal-grid { grid-auto-rows: 48px; }
}

/* ── Modal ── */
.modal {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.3);
  z-index: 1000;
  align-items: center;
  justify-content: center;
  padding: 20px;
  backdrop-filter: blur(4px);
}

.modal.active { display: flex; }

.modal-content {
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 32px 36px;
  max-width: 540px;
  width: 100%;
  max-height: 90vh;
  overflow-y: auto;
  box-shadow: 0 20px 60px rgba(0,0,0,0.12);
}

.modal-title {
  font-size: 18px;
  font-weight: 700;
  color: var(--ink);
  margin-bottom: 24px;
  letter-spacing: -0.3px;
}

.form-group { margin-bottom: 16px; }

.form-label {
  display: block;
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.7px;
  color: var(--ink-mid);
  margin-bottom: 6px;
}

.form-input, .form-textarea {
  width: 100%;
  padding: 9px 12px;
  border: 1px solid var(--border);
  border-radius: 6px;
  font-size: 14px;
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-weight: 400;
  background: var(--bg);
  color: var(--ink);
  transition: border-color 0.15s, box-shadow 0.15s;
}

.form-textarea { min-height: 80px; resize: vertical; }

.form-input:focus, .form-textarea:focus {
  outline: none;
  border-color: var(--ink);
  box-shadow: 0 0 0 2px rgba(26,26,26,0.08);
}

.modal-actions {
  display: flex;
  gap: 8px;
  margin-top: 24px;
  justify-content: flex-end;
}

/* ── Footer ── */
.footer-note {
  text-align: center;
  color: var(--ink-faint);
  font-size: 11px;
  font-weight: 400;
  margin-top: 48px;
}

/* ── Responsive ── */
@media (max-width: 768px) {
  .container { padding: 28px 16px; }
  .projects-grid { grid-template-columns: 1fr; }
  header { flex-direction: column; align-items: flex-start; }
  .stats { width: 100%; }
  .stat-box { flex: 1; }
  .modal-content { padding: 24px 20px; }
  .filter-group { margin-left: 0; }
}
</style>
</head>
<body>
<div class="container">

  <header>
    <div class="header-brand">
      <img src="./logo.png" alt="logo" class="logo-img">
      <div class="header-title">
        <h1>接案紀事</h1>
        <div class="subtitle">最後更新：<span id="lastUpdated">—</span></div>
      </div>
    </div>
    <div class="stats">
      <div class="stat-box">
        <div class="stat-value" id="totalCount">0</div>
        <div class="stat-label">專案</div>
      </div>
      <div class="stat-box">
        <div class="stat-value" id="avgProgress">0%</div>
        <div class="stat-label">平均進度</div>
      </div>
      <div class="stat-box">
        <div class="stat-value" id="todoCount">0</div>
        <div class="stat-label">待辦</div>
      </div>
    </div>
  </header>

  <div class="tabs">
    <button class="tab-btn active" onclick="switchView('projects', this)">專案看板</button>
    <button class="tab-btn" onclick="switchView('calendar', this)">行事曆</button>
  </div>

  <div id="viewProjects" class="view active">
    <div class="controls">
      <button class="btn btn-primary" onclick="openAddModal()">+ 新增專案</button>
      <button class="btn btn-secondary" onclick="exportData()">匯出備份</button>
      <div class="filter-group">
        <button class="filter-btn active" onclick="filterProjects('all', this)">全部</button>
        <button class="filter-btn" onclick="filterProjects('active', this)">進行中</button>
        <button class="filter-btn" onclick="filterProjects('review', this)">即將完成</button>
        <button class="filter-btn" onclick="filterProjects('archived', this)">已封存</button>
      </div>
    </div>

    <div class="projects-grid" id="projectsGrid">
      <div class="loading-state">載入中…</div>
    </div>
  </div>

  <div id="viewCalendar" class="view">
    <div class="cal-layout">
      <div class="cal-main">
        <div class="cal-toolbar">
          <div class="cal-nav">
            <button class="btn btn-secondary" onclick="calNav(-1)">‹</button>
            <div class="cal-month-label" id="calMonthLabel">—</div>
            <button class="btn btn-secondary" onclick="calNav(1)">›</button>
            <button class="btn btn-secondary" onclick="calToday()">今天</button>
          </div>
          <div class="cal-toolbar-actions">
            <button class="btn btn-primary" onclick="openEventModal()">+ 新增行程</button>
            <button class="btn btn-secondary" id="syncICloudBtn" onclick="syncICloud()">同步 iCloud</button>
            <div class="filter-group" id="calTypeFilter">
              <button class="filter-btn active" onclick="filterEvents('all', this)">全部</button>
              <button class="filter-btn" onclick="filterEvents('task', this)">工作</button>
              <button class="filter-btn" onclick="filterEvents('meeting', this)">會議</button>
              <button class="filter-btn" onclick="filterEvents('deadline', this)">交件</button>
              <button class="filter-btn" onclick="filterEvents('payment', this)">收款</button>
              <button class="filter-btn" onclick="filterEvents('other', this)">其他</button>
            </div>
          </div>
        </div>
        <div class="cal-weekdays">
          <div>日</div><div>一</div><div>二</div><div>三</div><div>四</div><div>五</div><div>六</div>
        </div>
        <div class="cal-grid" id="calGrid">
          <div class="loading-state">載入中…</div>
        </div>
      </div>
      <div class="cal-sidebar">
        <div class="cal-sidebar-title">近期行程</div>
        <div id="calAgenda" class="cal-agenda"></div>
      </div>
    </div>
  </div>

  <div class="footer-note">資料儲存於雲端，跨裝置即時同步。</div>
</div>

<!-- Modal -->
<div class="modal" id="projectModal">
  <div class="modal-content">
    <div class="modal-title" id="modalTitle">新增專案</div>
    <input type="hidden" id="editProjectId">
    <div class="form-group">
      <label class="form-label">專案名稱</label>
      <input type="text" class="form-input" id="projectName" placeholder="例：公司網站設計">
    </div>
    <div class="form-group">
      <label class="form-label">客戶</label>
      <input type="text" class="form-input" id="projectClient" placeholder="例：ABC 公司">
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
      <div class="form-group">
        <label class="form-label">開始日期</label>
        <input type="date" class="form-input" id="projectStart">
      </div>
      <div class="form-group">
        <label class="form-label">截止日期</label>

}

}

async function saveProject() {
  const id = document.getElementById('editProjectId').value;
  const todoLines = document.getElementById('projectTodos').value.split('\n').filter(l => l.trim());
  const data = {
    id: id || Date.now().toString(),
    name: document.getElementById('projectName').value.trim(),
    client: document.getElementById('projectClient').value.trim(),
    start: document.getElementById('projectStart').value,
    end: document.getElementById('projectEnd').value,
    progress: parseInt(document.getElementById('projectProgress').value) || 0,
    stage: document.getElementById('projectStage').value.trim(),
    next: document.getElementById('projectNext').value.trim(),
    todos: todoLines.map(t => ({ text: t.trim(), done: false }))
  };

  if (!data.name) { alert('請輸入專案名稱'); return; }

  if (id) {
    const idx = projects.findIndex(p => p.id === id);
    const oldTodos = projects[idx].todos || [];
    data.todos = data.todos.map(nt => {
      const old = oldTodos.find(o => o.text === nt.text);
      return old ? { ...nt, done: old.done } : nt;
    });
    projects[idx] = data;
  } else {
    projects.unshift(data);
  }

  const btn = document.getElementById('saveBtn');
  btn.disabled = true;
  btn.textContent = '儲存中…';

  const ok = await persistProject(data);
  btn.disabled = false;
  btn.textContent = '儲存';

  if (ok) { render(); closeModal(); }
  else { alert('儲存失敗，請檢查網路連線'); }
}

function pad2(n) { return String(n).padStart(2, '0'); }
function toDateStr(y, m, d) { return `${y}-${pad2(m + 1)}-${pad2(d)}`; }

function renderCalendar() {
  document.getElementById('calMonthLabel').textContent = `${calYear}年${calMonth + 1}月`;

  const filtered = calFilter === 'all' ? events : events.filter(e => e.type === calFilter);

  const firstOfMonth = new Date(calYear, calMonth, 1);
  const startWeekday = firstOfMonth.getDay();
  const daysInMonth = new Date(calYear, calMonth + 1, 0).getDate();
  const daysInPrevMonth = new Date(calYear, calMonth, 0).getDate();
  const todayStr = toDateStr(new Date().getFullYear(), new Date().getMonth(), new Date().getDate());

  const cells = [];
  const prevYM = calMonth === 0 ? [calYear - 1, 11] : [calYear, calMonth - 1];
  for (let i = 0; i < startWeekday; i++) {
    const d = daysInPrevMonth - startWeekday + 1 + i;
    cells.push({ date: toDateStr(prevYM[0], prevYM[1], d), day: d, muted: true });
  }
  for (let d = 1; d <= daysInMonth; d++) {
    cells.push({ date: toDateStr(calYear, calMonth, d), day: d, muted: false });
  }
  const nextYM = calMonth === 11 ? [calYear + 1, 0] : [calYear, calMonth + 1];
  let nextDay = 1;
  while (cells.length < 42) {
    cells.push({ date: toDateStr(nextYM[0], nextYM[1], nextDay), day: nextDay, muted: true });
    nextDay++;
  }

  const grid = document.getElementById('calGrid');
  grid.innerHTML = cells.map(c => {
    const dayEvents = filtered.filter(e => e.date === c.date).sort((a, b) => (a.time || '99:99').localeCompare(b.time || '99:99'));
    const isToday = c.date === todayStr;
    const maxShown = window.innerWidth <= 640 ? 1 : 3;
    const shown = dayEvents.slice(0, maxShown);
    const more = dayEvents.length - shown.length;
    const pills = shown.map(e => {
      const t = EVENT_TYPES[e.type] || EVENT_TYPES.other;
      return `<div class="cal-pill" onclick="event.stopPropagation();openEventModal('${e.id}')" title="${escapeHtml(e.title)}">
        <span class="status-dot ${t.dot}"></span>${e.time ? escapeHtml(e.time) + ' ' : ''}${escapeHtml(e.title)}
      </div>`;
    }).join('');
    const moreHtml = more > 0 ? `<div class="cal-more">+${more}</div>` : '';
    return `
      <div class="cal-cell ${c.muted ? 'muted' : ''} ${isToday ? 'today' : ''}" onclick="openEventModal(null, '${c.date}')">
        <div class="cal-day-num">${c.day}</div>
        <div class="cal-pills">${pills}${moreHtml}</div>
      </div>
    `;
  }).join('');

  renderAgenda(filtered);
}

function renderAgenda(filtered) {
  const todayStr = toDateStr(new Date().getFullYear(), new Date().getMonth(), new Date().getDate());
  const upcoming = filtered
    .filter(e => e.date >= todayStr)
    .sort((a, b) => (a.date + (a.time || '99:99')).localeCompare(b.date + (b.time || '99:99')))
    .slice(0, 10);
  const box = document.getElementById('calAgenda');
  if (upcoming.length === 0) {
    box.innerHTML = '<div class="cal-agenda-empty">近期沒有安排的行程</div>';
    return;
  }
  box.innerHTML = upcoming.map(e => {
    const t = EVENT_TYPES[e.type] || EVENT_TYPES.other;
    const proj = projects.find(p => p.id === e.projectId);
    return `
      <div class="cal-agenda-item" onclick="openEventModal('${e.id}')">
        <div class="cal-agenda-date">${formatDate(e.date)}${e.time ? ' · ' + escapeHtml(e.time) : ''}</div>
        <div class="cal-agenda-main">
          <span class="status-dot ${t.dot}"></span>
          <span class="cal-agenda-title">${escapeHtml(e.title)}</span>
        </div>
        ${proj ? `<div class="cal-agenda-project">${escapeHtml(proj.name)}</div>` : ''}
      </div>
    `;
  }).join('');
}

function populateEventProjectSelect() {
  const sel = document.getElementById('eventProject');
  const activeProjects = projects.filter(p => !p.archived);
  sel.innerHTML = '<option value="">— 不關聯 —</option>' +
    activeProjects.map(p => `<option value="${p.id}">${escapeHtml(p.name)}</option>`).join('');
}

function openEventModal(id, presetDate) {
  populateEventProjectSelect();
  document.getElementById('deleteEventBtn').style.display = id ? '' : 'none';
  if (id) {
    const e = events.find(x => x.id === id);
    if (!e) return;
    document.getElementById('eventModalTitle').textContent = '編輯行程';
    document.getElementById('editEventId').value = e.id;
    document.getElementById('eventTitle').value = e.title;
    document.getElementById('eventDate').value = e.date;
    document.getElementById('eventTime').value = e.time;
    document.getElementById('eventType').value = e.type;
    document.getElementById('eventProject').value = e.projectId;
    document.getElementById('eventNote').value = e.note;
  } else {
    document.getElementById('eventModalTitle').textContent = '新增行程';
    document.getElementById('editEventId').value = '';
    document.getElementById('eventTitle').value = '';
    document.getElementById('eventDate').value = presetDate || toDateStr(calYear, calMonth, new Date().getDate());
    document.getElementById('eventTime').value = '';
    document.getElementById('eventType').value = 'task';
    document.getElementById('eventProject').value = '';
    document.getElementById('eventNote').value = '';
  }
  document.getElementById('eventModal').classList.add('active');
}

function closeEventModal() {
  document.getElementById('eventModal').classList.remove('active');
}

async function saveEvent() {
  const id = document.getElementById('editEventId').value;
  const data = {
    id: id || Date.now().toString(),
    title: document.getElementById('eventTitle').value.trim(),
    date: document.getElementById('eventDate').value,
    time: document.getElementById('eventTime').value,
    type: document.getElementById('eventType').value,
    projectId: document.getElementById('eventProject').value,
    note: document.getElementById('eventNote').value.trim()
  };
  if (!data.title) { alert('請輸入標題'); return; }
  if (!data.date) { alert('請選擇日期'); return; }

  const btn = document.getElementById('saveEventBtn');
  btn.disabled = true;
  btn.textContent = '儲存中…';

  const ok = await persistEvent(data);
  btn.disabled = false;
  btn.textContent = '儲存';

  if (ok) {
    const idx = events.findIndex(e => e.id === data.id);
    if (idx >= 0) events[idx] = data; else events.push(data);
    renderCalendar();
    closeEventModal();
  } else {
    alert('儲存失敗，請檢查網路連線');
  }
}

async function deleteEventFromModal() {
  const id = document.getElementById('editEventId').value;
  if (!id) return;
  if (!confirm('確定要刪除這個行程嗎？')) return;
  const { error } = await db.from('events').delete().eq('id', id);
  if (!error) {
    events = events.filter(e => e.id !== id);
    renderCalendar();
    closeEventModal();
  } else {
    alert('刪除失敗，請稍後再試');
  }
}

document.getElementById('eventModal').addEventListener('click', e => {
  if (e.target.id === 'eventModal') closeEventModal();
});

const _now = new Date();
calYear = _now.getFullYear();
calMonth = _now.getMonth();

let _resizeTimer = null;
window.addEventListener('resize', () => {
  clearTimeout(_resizeTimer);
  _resizeTimer = setTimeout(() => { if (currentView === 'calendar') renderCalendar(); }, 200);
});

loadProjects();
loadEvents();
</script>
