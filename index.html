<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>接案紀事</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:          #FFFFFF;
  --surface:     #FFFFFF;
  --surface-alt: #F7F7F5;
  --border:      #E9E9E7;
  --border-dark: #D3D3CF;
  --ink:         #1A1A1A;
  --ink-mid:     #787774;
  --ink-faint:   #AEADA9;
  --accent:      #1A1A1A;
  --tag-bg:      #F1F1EF;
  --tag-text:    #787774;
  --dot-a:       #E07B39;
  --dot-b:       #5A9E6F;
  --dot-c:       #9E5A9E;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Plus Jakarta Sans', sans-serif;
  background: var(--bg);
  min-height: 100vh;
  color: var(--ink);
  font-size: 14px;
  line-height: 1.5;
}

.container {
  max-width: 1280px;
  margin: 0 auto;
  padding: 48px 40px;
}

/* ── Header ── */
header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  flex-wrap: wrap;
  gap: 20px;
  padding-bottom: 28px;
  margin-bottom: 28px;
  border-bottom: 1px solid var(--border);
}

.header-brand {
  display: flex;
  align-items: center;
  gap: 14px;
}

.logo-img {
  width: 48px;
  height: 48px;
  object-fit: contain;
}

.header-title h1 {
  font-size: 20px;
  font-weight: 700;
  color: var(--ink);
  letter-spacing: -0.3px;
}

.header-title .subtitle {
  font-size: 12px;
  color: var(--ink-faint);
  margin-top: 2px;
  font-weight: 400;
}

.stats {
  display: flex;
  gap: 0;
  border: 1px solid var(--border);
  border-radius: 8px;
  overflow: hidden;
}

.stat-box {
  padding: 10px 24px;
  text-align: center;
  border-right: 1px solid var(--border);
}

.stat-box:last-child { border-right: none; }

.stat-value {
  font-size: 20px;
  font-weight: 700;
  color: var(--ink);
  letter-spacing: -0.5px;
  line-height: 1;
}

.stat-label {
  font-size: 11px;
  color: var(--ink-faint);
  margin-top: 3px;
  font-weight: 400;
}

/* ── Controls ── */
.controls {
  display: flex;
  gap: 8px;
  margin-bottom: 24px;
  align-items: center;
  flex-wrap: wrap;
}

.btn {
  padding: 7px 14px;
  border-radius: 6px;
  border: 1px solid var(--border);
  cursor: pointer;
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-size: 13px;
  font-weight: 500;
  transition: all 0.15s;
  white-space: nowrap;
}

.btn-primary {
  background: var(--ink);
  color: #fff;
  border-color: var(--ink);
}

.btn-primary:hover { background: #333; border-color: #333; }

.btn-secondary {
  background: var(--bg);
  color: var(--ink-mid);
}

.btn-secondary:hover { background: var(--surface-alt); color: var(--ink); }
.btn:disabled { opacity: 0.4; cursor: not-allowed; }

.filter-group {
  display: flex;
  margin-left: auto;
  border: 1px solid var(--border);
  border-radius: 6px;
  overflow: hidden;
}

.filter-btn {
  padding: 7px 14px;
  border: none;
  border-right: 1px solid var(--border);
  background: var(--bg);
  cursor: pointer;
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-size: 12px;
  font-weight: 500;
  color: var(--ink-mid);
  transition: all 0.15s;
}

.filter-btn:last-child { border-right: none; }
.filter-btn.active { background: var(--ink); color: #fff; }
.filter-btn:hover:not(.active) { background: var(--surface-alt); color: var(--ink); }

/* ── Grid ── */
.projects-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
  gap: 12px;
}

.loading-state {
  grid-column: 1 / -1;
  text-align: center;
  padding: 80px;
  color: var(--ink-faint);
  font-size: 14px;
}

/* ── Card ── */
.project-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 20px 22px;
  transition: box-shadow 0.2s, border-color 0.2s;
}

.project-card:hover {
  border-color: var(--border-dark);
  box-shadow: 0 4px 20px rgba(0,0,0,0.06);
}

.card-header {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  gap: 12px;
  margin-bottom: 14px;
}

.project-title {
  font-size: 15px;
  font-weight: 600;
  color: var(--ink);
  line-height: 1.3;
}

.project-client {
  font-size: 12px;
  color: var(--ink-faint);
  margin-top: 3px;
  font-weight: 400;
}

.status-tag {
  display: flex;
  align-items: center;
  gap: 5px;
  background: var(--tag-bg);
  border-radius: 4px;
  padding: 3px 8px;
  flex-shrink: 0;
  white-space: nowrap;
}

.status-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  flex-shrink: 0;
}

.status-dot.amber  { background: var(--dot-a); }
.status-dot.green  { background: var(--dot-b); }
.status-dot.purple { background: var(--dot-c); }

.status-label {
  font-size: 11px;
  font-weight: 500;
  color: var(--tag-text);
}

/* Dates */
.dates {
  display: flex;
  gap: 20px;
  padding: 10px 0;
  border-top: 1px solid var(--border);
  border-bottom: 1px solid var(--border);
  margin-bottom: 14px;
}

.date-label {
  font-size: 10px;
  font-weight: 500;
  text-transform: uppercase;
  letter-spacing: 0.6px;
  color: var(--ink-faint);
}

.date-value {
  font-size: 12px;
  color: var(--ink-mid);
  margin-top: 2px;
  font-weight: 500;
}

/* Progress */
.progress-section { margin-bottom: 2px; }

.progress-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 8px;
}

.progress-label {
  font-size: 11px;
  font-weight: 500;
  color: var(--ink-faint);
  text-transform: uppercase;
  letter-spacing: 0.6px;
}

.progress-value {
  font-size: 13px;
  font-weight: 700;
  color: var(--ink);
}

.progress-bar {
  width: 100%;
  height: 3px;
  background: var(--border);
  border-radius: 2px;
}

.progress-fill {
  height: 100%;
  background: var(--ink);
  border-radius: 2px;
  transition: width 0.4s ease;
}

/* Sections */
.section {
  margin-top: 14px;
  padding-top: 14px;
  border-top: 1px solid var(--border);
}

.section-title {
  font-size: 10px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.7px;
  color: var(--ink-faint);
  margin-bottom: 6px;
}

.section-content {
  font-size: 13px;
  color: var(--ink-mid);
  line-height: 1.65;
  font-weight: 400;
  white-space: pre-wrap;
}

/* Todo */
.todo-list { list-style: none; }

.todo-item {
  display: flex;
  align-items: flex-start;
  gap: 8px;
  padding: 4px 0;
  font-size: 13px;
  font-weight: 400;
  color: var(--ink-mid);
  line-height: 1.55;
}

.todo-item input[type="checkbox"] {
  margin-top: 2px;
  cursor: pointer;
  accent-color: var(--ink);
  flex-shrink: 0;
}

.todo-item.done span {
  text-decoration: line-through;
  color: var(--ink-faint);
}

.todo-delete {
  margin-left: auto;
  flex-shrink: 0;
  background: none;
  border: none;
  cursor: pointer;
  color: var(--ink-faint);
  font-size: 14px;
  line-height: 1;
  padding: 0 2px;
  opacity: 0;
  transition: opacity 0.15s, color 0.15s;
}
.todo-item:hover .todo-delete { opacity: 1; }
.todo-delete:hover { color: #d04040; }

/* Card Actions */
.card-actions {
  display: flex;
  gap: 0;
  margin-top: 14px;
  padding-top: 14px;
  border-top: 1px solid var(--border);
}

.action-btn {
  flex: 1;
  padding: 6px 4px;
  border: none;
  border-right: 1px solid var(--border);
  background: transparent;
  cursor: pointer;
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-size: 11px;
  font-weight: 500;
  color: var(--ink-faint);
  transition: all 0.15s;
  border-radius: 0;
}

.action-btn:last-child { border-right: none; }
.action-btn:hover { color: var(--ink); background: var(--surface-alt); }
.action-btn.danger:hover { color: #d04040; background: #fef5f5; }

/* ── Modal ── */
.modal {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.3);
  z-index: 1000;
  align-items: center;
  justify-content: center;
  padding: 20px;
  backdrop-filter: blur(4px);
}

.modal.active { display: flex; }

.modal-content {
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 32px 36px;
  max-width: 540px;
  width: 100%;
  max-height: 90vh;
  overflow-y: auto;
  box-shadow: 0 20px 60px rgba(0,0,0,0.12);
}

.modal-title {
  font-size: 18px;
  font-weight: 700;
  color: var(--ink);
  margin-bottom: 24px;
  letter-spacing: -0.3px;
}

.form-group { margin-bottom: 16px; }

.form-label {
  display: block;
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.7px;
  color: var(--ink-mid);
  margin-bottom: 6px;
}

.form-input, .form-textarea {
  width: 100%;
  padding: 9px 12px;
  border: 1px solid var(--border);
  border-radius: 6px;
  font-size: 14px;
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-weight: 400;
  background: var(--bg);
  color: var(--ink);
  transition: border-color 0.15s, box-shadow 0.15s;
}

.form-textarea { min-height: 80px; resize: vertical; }

.form-input:focus, .form-textarea:focus {
  outline: none;
  border-color: var(--ink);
  box-shadow: 0 0 0 2px rgba(26,26,26,0.08);
}

.modal-actions {
  display: flex;
  gap: 8px;
  margin-top: 24px;
  justify-content: flex-end;
}

/* ── Footer ── */
.footer-note {
  text-align: center;
  color: var(--ink-faint);
  font-size: 11px;
  font-weight: 400;
  margin-top: 48px;
}

/* ── Responsive ── */
@media (max-width: 768px) {
  .container { padding: 28px 16px; }
  .projects-grid { grid-template-columns: 1fr; }
  header { flex-direction: column; align-items: flex-start; }
  .stats { width: 100%; }
  .stat-box { flex: 1; }
  .modal-content { padding: 24px 20px; }
  .filter-group { margin-left: 0; }
}
</style>
</head>
<body>
<div class="container">

  <header>
    <div class="header-brand">
      <img src="./logo.png" alt="logo" class="logo-img">
      <div class="header-title">
        <h1>接案紀事</h1>
        <div class="subtitle">最後更新：<span id="lastUpdated">—</span></div>
      </div>
    </div>
    <div class="stats">
      <div class="stat-box">
        <div class="stat-value" id="totalCount">0</div>
        <div class="stat-label">專案</div>
      </div>
      <div class="stat-box">
        <div class="stat-value" id="avgProgress">0%</div>
        <div class="stat-label">平均進度</div>
      </div>
      <div class="stat-box">
        <div class="stat-value" id="todoCount">0</div>
        <div class="stat-label">待辦</div>
      </div>
    </div>
  </header>

  <div class="controls">
    <button class="btn btn-primary" onclick="openAddModal()">+ 新增專案</button>
    <button class="btn btn-secondary" onclick="exportData()">匯出備份</button>
    <div class="filter-group">
      <button class="filter-btn active" onclick="filterProjects('all', this)">全部</button>
      <button class="filter-btn" onclick="filterProjects('active', this)">進行中</button>
      <button class="filter-btn" onclick="filterProjects('review', this)">即將完成</button>
      <button class="filter-btn" onclick="filterProjects('archived', this)">已封存</button>
    </div>
  </div>

  <div class="projects-grid" id="projectsGrid">
    <div class="loading-state">載入中…</div>
  </div>

  <div class="footer-note">資料儲存於雲端，跨裝置即時同步。</div>
</div>

<!-- Modal -->
<div class="modal" id="projectModal">
  <div class="modal-content">
    <div class="modal-title" id="modalTitle">新增專案</div>
    <input type="hidden" id="editProjectId">
    <div class="form-group">
      <label class="form-label">專案名稱</label>
      <input type="text" class="form-input" id="projectName" placeholder="例：公司網站設計">
    </div>
    <div class="form-group">
      <label class="form-label">客戶</label>
      <input type="text" class="form-input" id="projectClient" placeholder="例：ABC 公司">
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
      <div class="form-group">
        <label class="form-label">開始日期</label>
        <input type="date" class="form-input" id="projectStart">
      </div>
      <div class="form-group">
        <label class="form-label">截止日期</label>
        <input type="date" class="form-input" id="projectEnd">
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">完成進度 (%)</label>
      <input type="number" class="form-input" id="projectProgress" min="0" max="100" value="0">
    </div>
    <div class="form-group">
      <label class="form-label">當前階段</label>
      <textarea class="form-textarea" id="projectStage" placeholder="目前正在做什麼"></textarea>
    </div>
    <div class="form-group">
      <label class="form-label">下一步要做什麼</label>
      <textarea class="form-textarea" id="projectNext" placeholder="接下來的計畫"></textarea>
    </div>
    <div class="form-group">
      <label class="form-label">工作筆記 / 待辦事項（每行一項）</label>
      <textarea class="form-textarea" id="projectTodos" placeholder="待辦事項一&#10;待辦事項二" style="min-height:120px;"></textarea>
    </div>
    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="closeModal()">取消</button>
      <button class="btn btn-primary" id="saveBtn" onclick="saveProject()">儲存</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>

  'https://rstaitavlvzlinehniaw.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJzdGFpdGF2bHZ6bGluZWhuaWF3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc3MTI2ODAsImV4cCI6MjA5MzI4ODY4MH0.dFGt15A8Rnw7C60Au-0HMIcSjEcl-F39Pf-4F3eEY7c'
);

const SEED_PROJECTS = [
  {

    next: '完成所有訂單入口排版設計，研究 RAGIC 表單入口樣式是否可以修改（挑選商品時增加筆數）',
    todos: [
      { text: '表單填寫後拋轉訂單管理 + 應收款項', done: false },
      { text: '測試日後維護難度', done: false },
      { text: '應收帳款頁面', done: false },

    ]
  }
];

let projects = [];
let currentFilter = 'all';

function dbToProject(row) {
  return {
    id: row.id,
    name: row.name,
    client: row.client || '',
    start: row.start_date || '',
    end: row.end_date || '',
    progress: row.progress || 0,
    stage: row.stage || '',
    next: row.next_step || '',
    todos: row.todos || [],
    archived: row.archived || false
  };
}

function projectToDb(p) {
  return {
    id: p.id,
    name: p.name,
    client: p.client,
    start_date: p.start || null,
    end_date: p.end || null,
    progress: p.progress,
    stage: p.stage,
    next_step: p.next,
    todos: p.todos || [],
    archived: p.archived || false,
    updated_at: new Date().toISOString()
  };
}

async function loadProjects() {
  const { data, error } = await db
    .from('projects')
    .select('*')
    .order('updated_at', { ascending: false });

  if (error) {
    document.getElementById('projectsGrid').innerHTML =
      '<div class="loading-state">載入失敗，請重新整理頁面</div>';
    console.error(error);
    return;
  }

  if (data.length === 0) {
    const rows = SEED_PROJECTS.map(projectToDb);
    const { error: seedErr } = await db.from('projects').insert(rows);
    if (!seedErr) { projects = SEED_PROJECTS; render(); }
    return;
  }

  projects = data.map(dbToProject);
  const latest = data.reduce((a, b) => a.updated_at > b.updated_at ? a : b);
  document.getElementById('lastUpdated').textContent =
    new Date(latest.updated_at).toLocaleString('zh-TW', { hour12: false });
  render();
}

async function persistProject(p) {
  const { error } = await db.from('projects').upsert(projectToDb(p));
  if (error) { console.error(error); return false; }
  document.getElementById('lastUpdated').textContent =
    new Date().toLocaleString('zh-TW', { hour12: false });
  return true;
}

function getStatus(progress) {
  if (progress >= 90) return { label: '即將完成', dot: 'purple' };
  if (progress >= 50) return { label: '進行中',   dot: 'green'  };
  return                      { label: '起步中',   dot: 'amber'  };
}

function formatDate(d) {
  if (!d) return '未設定';
  return d.replace(/-/g, '/');
}

function render() {
  const grid = document.getElementById('projectsGrid');
  let filtered = projects;
  if (currentFilter === 'archived') {
    filtered = projects.filter(p => p.archived);
  } else {
    filtered = projects.filter(p => !p.archived);
    if (currentFilter === 'active') filtered = filtered.filter(p => p.progress < 90);
    else if (currentFilter === 'review') filtered = filtered.filter(p => p.progress >= 90);
  }

  if (filtered.length === 0) {
    grid.innerHTML = '<div class="loading-state">沒有符合條件的專案</div>';
  } else {
    grid.innerHTML = filtered.map(p => {
      const status = getStatus(p.progress);
      const pendingTodos = (p.todos || []).filter(t => !t.done).length;
      const totalTodos   = (p.todos || []).length;
      const todos = (p.todos || []).map((t, i) => `
        <li class="todo-item ${t.done ? 'done' : ''}">
          <input type="checkbox" ${t.done ? 'checked' : ''} onchange="toggleTodo('${p.id}', ${i})">
          <span>${escapeHtml(t.text)}</span>
          <button class="todo-delete" onclick="deleteTodo('${p.id}', ${i})" title="刪除">×</button>
        </li>
      `).join('');

      return `
        <div class="project-card">
          <div class="card-header">
            <div>
              <div class="project-title">${escapeHtml(p.name)}</div>
              <div class="project-client">${escapeHtml(p.client)}</div>
            </div>
            <div class="status-tag">
              <div class="status-dot ${status.dot}"></div>
              <span class="status-label">${status.label}</span>
            </div>
          </div>

          <div class="dates">
            <div>
              <div class="date-label">開始</div>
              <div class="date-value">${formatDate(p.start)}</div>
            </div>
            <div>
              <div class="date-label">截止</div>
              <div class="date-value">${formatDate(p.end)}</div>
            </div>
          </div>

          <div class="progress-section">
            <div class="progress-header">
              <span class="progress-label">進度</span>
              <span class="progress-value">${p.progress}%</span>
            </div>
            <div class="progress-bar">
              <div class="progress-fill" style="width:${p.progress}%"></div>
            </div>
          </div>

          ${p.stage ? `<div class="section"><div class="section-title">當前階段</div><div class="section-content">${escapeHtml(p.stage)}</div></div>` : ''}
          ${p.next  ? `<div class="section"><div class="section-title">下一步</div><div class="section-content">${escapeHtml(p.next)}</div></div>` : ''}
          ${todos   ? `<div class="section"><div class="section-title">待辦 · ${pendingTodos} / ${totalTodos}</div><ul class="todo-list">${todos}</ul></div>` : ''}

          <div class="card-actions">
            ${p.archived ? `
              <button class="action-btn" onclick="toggleArchive('${p.id}')">取消封存</button>
              <button class="action-btn danger" onclick="deleteProject('${p.id}')">刪除</button>
            ` : `
              <button class="action-btn" onclick="editProject('${p.id}')">編輯</button>
              <button class="action-btn" onclick="addTodoTo('${p.id}')">新增待辦</button>
              <button class="action-btn" onclick="toggleArchive('${p.id}')">封存</button>
              <button class="action-btn danger" onclick="deleteProject('${p.id}')">刪除</button>
            `}
          </div>
        </div>
      `;
    }).join('');
  }

  const activeProjects = projects.filter(p => !p.archived);
  document.getElementById('totalCount').textContent = activeProjects.length;
  const avg = activeProjects.length
    ? Math.round(activeProjects.reduce((s, p) => s + p.progress, 0) / activeProjects.length)
    : 0;
  document.getElementById('avgProgress').textContent = avg + '%';
  const todoTotal = activeProjects.reduce((s, p) => s + (p.todos || []).filter(t => !t.done).length, 0);
  document.getElementById('todoCount').textContent = todoTotal;
}

function escapeHtml(s) {
  const div = document.createElement('div');
  div.textContent = s || '';
  return div.innerHTML;
}

function filterProjects(filter, btn) {
  currentFilter = filter;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  render();
}

async function toggleTodo(projectId, todoIdx) {
  const p = projects.find(x => x.id === projectId);
  if (!p || !p.todos[todoIdx]) return;
  p.todos[todoIdx].done = !p.todos[todoIdx].done;
  render();
  await persistProject(p);
}

function openAddModal() {
  document.getElementById('modalTitle').textContent = '新增專案';
  document.getElementById('editProjectId').value = '';
  document.getElementById('projectName').value = '';
  document.getElementById('projectClient').value = '';
  document.getElementById('projectStart').value = '';
  document.getElementById('projectEnd').value = '';
  document.getElementById('projectProgress').value = '0';
  document.getElementById('projectStage').value = '';
  document.getElementById('projectNext').value = '';
  document.getElementById('projectTodos').value = '';
  document.getElementById('projectModal').classList.add('active');
}

function editProject(id) {
  const p = projects.find(x => x.id === id);
  if (!p) return;
  document.getElementById('modalTitle').textContent = '編輯專案';
  document.getElementById('editProjectId').value = id;
  document.getElementById('projectName').value = p.name;
  document.getElementById('projectClient').value = p.client;
  document.getElementById('projectStart').value = p.start;
  document.getElementById('projectEnd').value = p.end;
  document.getElementById('projectProgress').value = p.progress;
  document.getElementById('projectStage').value = p.stage;
  document.getElementById('projectNext').value = p.next;
  document.getElementById('projectTodos').value = (p.todos || []).map(t => t.text).join('\n');
  document.getElementById('projectModal').classList.add('active');
}

function closeModal() {
  document.getElementById('projectModal').classList.remove('active');
}

async function saveProject() {
  const id = document.getElementById('editProjectId').value;
  const todoLines = document.getElementById('projectTodos').value.split('\n').filter(l => l.trim());
  const data = {
    id: id || Date.now().toString(),
    name: document.getElementById('projectName').value.trim(),
    client: document.getElementById('projectClient').value.trim(),
    start: document.getElementById('projectStart').value,
    end: document.getElementById('projectEnd').value,
    progress: parseInt(document.getElementById('projectProgress').value) || 0,
    stage: document.getElementById('projectStage').value.trim(),
    next: document.getElementById('projectNext').value.trim(),
    todos: todoLines.map(t => ({ text: t.trim(), done: false }))
  };

  if (!data.name) { alert('請輸入專案名稱'); return; }

  if (id) {
    const idx = projects.findIndex(p => p.id === id);
    const oldTodos = projects[idx].todos || [];
    data.todos = data.todos.map(nt => {
      const old = oldTodos.find(o => o.text === nt.text);
      return old ? { ...nt, done: old.done } : nt;
    });
    projects[idx] = data;
  } else {
    projects.unshift(data);
  }

  const btn = document.getElementById('saveBtn');
  btn.disabled = true;
  btn.textContent = '儲存中…';

  const ok = await persistProject(data);
  btn.disabled = false;
  btn.textContent = '儲存';

  if (ok) { render(); closeModal(); }
  else { alert('儲存失敗，請檢查網路連線'); }
}

async function deleteTodo(projectId, todoIdx) {
  const p = projects.find(x => x.id === projectId);
  if (!p) return;
  p.todos.splice(todoIdx, 1);
  render();
  await persistProject(p);
}

async function toggleArchive(id) {
  const p = projects.find(x => x.id === id);
  if (!p) return;
  p.archived = !p.archived;
  render();
  await persistProject(p);
}

async function deleteProject(id) {
  if (!confirm('確定要刪除這個專案嗎？')) return;
  const { error } = await db.from('projects').delete().eq('id', id);
  if (!error) { projects = projects.filter(p => p.id !== id); render(); }
  else { alert('刪除失敗，請稍後再試'); }
}

async function addTodoTo(id) {
  const text = prompt('新增待辦事項：');
  if (!text || !text.trim()) return;
  const p = projects.find(x => x.id === id);
  if (!p) return;
  if (!p.todos) p.todos = [];
  p.todos.push({ text: text.trim(), done: false });
  render();
  await persistProject(p);
}

function exportData() {
  const blob = new Blob([JSON.stringify(projects, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `專案備份_${new Date().toISOString().slice(0, 10)}.json`;
  a.click();
  URL.revokeObjectURL(url);
}

document.getElementById('projectModal').addEventListener('click', e => {
  if (e.target.id === 'projectModal') closeModal();
});

loadProjects();
</script>
</body>
</html>
